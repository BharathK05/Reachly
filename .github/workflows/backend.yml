name: Backend — Lint, Test & Deploy (Render)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (py compile)
        run: python -m py_compile main.py auth_utils.py routers/auth.py routers/campaigns.py routers/data.py routers/events.py agents/orchestrator.py agents/strategy_agent.py agents/audience_agent.py agents/content_agent.py agents/prediction_agent.py

      - name: Import check
        env:
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_SERVICE_KEY: "placeholder"
          JWT_SECRET: "ci-test-secret"
          OPENAI_API_KEY: "sk-placeholder"
        run: python -c "import main; print('✓ All imports OK')"

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
